version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: kniga_db
    environment:
      POSTGRES_USER: admin1
      POSTGRES_PASSWORD: zxcqwe
      POSTGRES_DB: kniga
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
